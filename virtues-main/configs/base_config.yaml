
dataset_path: '../../data/corentin/data/TerraMesh' # Path to dataset

experiments_dir: null # Outputs will be written to {experiments_dir}/{experiment.name}/

experiment:
  name: null # Initialize with the name of the run
  seed: 42
  wandb_entity: null
  wandb_project: null
  wandb_mode: disabled # "online", "offline", or "disabled"

training:
  epochs: 100
  batch_size: 8
  fp16: True
  bf16: False
  num_workers: 10
  gradient_accumulation_steps: 1
  lr: 0.0002
  lr_scheduler_type: cosine
  weight_decay: 0.01
  warmup_epochs: 10
  disable_eval: false

model:
  patch_size: 16
  model_dim: 512
  feedforward_dim: 1024
  encoder_pattern: hvhv
  num_encoder_heads: 4
  decoder_pattern: ff
  num_decoder_heads: 2
  num_decoder_hidden_layers: 0
  positional_embedding_type: rope
  dropout: 0.0
  group_layers: False
  norm_after_encoder_decoder: True

data:
  crop_size: 224
  masking_ratio: [0.6, 1.0]
  modalities:
  - "S2L2A"
  - "S2L1C"
  - "S1RTC"
  shuffle: True
  channels_file: 'assets/channels.csv'
  return_metadata: False
  shardshuffle: 100
  deterministric: False
  time_dim: False
  partial: False
  probs: null

